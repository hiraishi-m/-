<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>安全書類かんたん入力 | 伊田テクノス㈱</title>
<style>
  :root{
    --ink:#16241b; --green:#1f6b3a; --green-dk:#134426; --green-lt:#e8f3ec;
    --amber:#f5b301; --amber-lt:#fff6dd; --line:#d4ddd6; --white:#fff;
    --warn:#b23b2e; --sub:#5c6b61;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--paper,#f7f8f5);color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",system-ui,sans-serif;
    padding-bottom:96px;}
  .wrap{max-width:560px;margin:0 auto;}
  input,textarea,select,button{font-family:inherit;}
  input:focus,textarea:focus,select:focus{outline:2px solid var(--green);}
  header{background:var(--green);color:#fff;padding:12px 16px;display:flex;
    align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
  .brand{display:flex;align-items:center;gap:10px;}
  .mark{width:36px;height:36px;border-radius:8px;background:var(--amber);
    color:var(--green-dk);font-weight:800;font-size:20px;display:grid;place-items:center;}
  .b-title{font-size:17px;font-weight:800;line-height:1.1;}
  .b-sub{font-size:11px;opacity:.85;margin-top:2px;}
  .save{background:#fff;color:var(--green);border:none;border-radius:8px;
    padding:8px 14px;font-weight:700;font-size:14px;}
  .stepbar{display:flex;background:var(--green-dk);position:sticky;top:60px;z-index:19;overflow-x:auto;}
  .step{flex:1 0 auto;min-width:62px;background:transparent;color:#cfe3d6;border:none;padding:10px 2px;
    font-size:11.5px;font-weight:700;border-bottom:3px solid transparent;line-height:1.3;}
  .step.active{color:#fff;border-bottom:3px solid var(--amber);}
  .step .n{display:block;font-size:15px;}
  main{padding:14px;}
  .note{background:var(--green-lt);border:1px solid var(--line);
    border-left:4px solid var(--green);border-radius:6px;padding:11px 13px;
    font-size:12.5px;line-height:1.65;color:var(--green-dk);margin-bottom:14px;}
  .note b{color:var(--green-dk);}
  .note.amber{background:var(--amber-lt);border-left-color:var(--amber);color:#7a5b00;}
  .note.warn{background:#fdeceb;border-left-color:var(--warn);color:var(--warn);}
  .section{background:#fff;border:1px solid var(--line);border-radius:10px;
    margin-bottom:16px;overflow:hidden;}
  .sec-head{background:var(--green-lt);color:var(--green-dk);font-weight:800;
    font-size:14px;padding:10px 14px;border-bottom:1px solid var(--line);}
  .sec-body{padding:14px;}
  .field{display:block;margin-bottom:13px;}
  .f-label{display:block;font-size:12.5px;font-weight:700;color:var(--sub);margin-bottom:5px;}
  .inp{width:100%;border:1px solid var(--line);background:#fffdf2;border-radius:8px;
    padding:11px 12px;font-size:16px;color:var(--ink);}
  textarea.inp{resize:vertical;line-height:1.5;}
  select.inp{background:#fffdf2;}
  .add{width:100%;background:var(--green-lt);color:var(--green-dk);
    border:2px dashed var(--green);border-radius:10px;padding:13px;
    font-size:15px;font-weight:800;margin-top:4px;}
  .wcard{background:#fff;border:1px solid var(--line);border-radius:10px;
    margin-bottom:14px;overflow:hidden;}
  .whead{display:flex;align-items:center;gap:10px;background:var(--green-lt);
    padding:8px 12px;border-bottom:1px solid var(--line);}
  .wno{background:var(--green);color:#fff;width:24px;height:24px;border-radius:6px;
    display:grid;place-items:center;font-weight:800;font-size:13px;}
  .wname{flex:1;font-weight:700;font-size:14px;color:var(--green-dk);}
  .wdel{background:transparent;color:var(--warn);border:1px solid var(--warn);
    border-radius:6px;padding:5px 10px;font-size:12px;font-weight:700;}
  .wgrid{padding:12px;display:grid;gap:10px;}
  .wlabel{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:4px;}
  .summary{background:#fff;border:1px solid var(--line);border-radius:10px;padding:4px 14px;margin-bottom:14px;}
  .sumrow{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px;}
  .sumrow:last-child{border-bottom:none;}
  .sum-label{color:var(--sub);font-weight:700;}
  .sum-val{text-align:right;font-weight:600;}
  .warnbox{background:#fdeceb;border:1px solid var(--warn);color:var(--warn);
    border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:12px;font-weight:700;}
  .bigbtn{width:100%;background:var(--amber);color:var(--green-dk);border:none;
    border-radius:10px;padding:16px;font-size:17px;font-weight:800;margin-bottom:10px;}
  .bigbtn:disabled{opacity:.45;}
  .subbtn{width:100%;background:#fff;color:var(--green);border:2px solid var(--green);
    border-radius:10px;padding:13px;font-size:15px;font-weight:800;margin-bottom:10px;}
  .outhint{font-size:12px;color:var(--sub);line-height:1.7;margin-top:6px;}
  .navrow{display:flex;gap:10px;margin-top:8px;}
  .nav{flex:1;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:800;}
  .nav-prev{background:#e7ebe8;color:var(--green-dk);}
  .nav-next{background:var(--green);color:#fff;}
  footer{position:fixed;bottom:0;left:0;right:0;max-width:560px;margin:0 auto;
    background:#fff;border-top:1px solid var(--line);padding:10px 16px;
    display:flex;align-items:center;gap:12px;z-index:20;}
  .clear{background:transparent;color:var(--warn);border:1px solid var(--warn);
    border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;}
  .footnote{font-size:11px;color:var(--sub);line-height:1.4;}
  .toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
    background:var(--green-dk);color:#fff;padding:11px 18px;border-radius:22px;
    font-size:13.5px;font-weight:700;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,.25);
    opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%;text-align:center;}
  .toast.show{opacity:1;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="mark">安</div>
      <div>
        <div class="b-title">安全書類 かんたん入力</div>
        <div class="b-sub">伊田テクノス㈱ 提出用 / 入力→Excel自動作成</div>
      </div>
    </div>
    <button class="save" id="saveBtn">保存</button>
  </header>
  <nav class="stepbar" id="stepbar"></nav>
  <main id="main"></main>
  <footer>
    <button class="clear" id="clearBtn">入力を消去</button>
    <span class="footnote">入力データはこの端末内にのみ保存されます</span>
  </footer>
</div>
<div class="toast" id="toast"></div>

function clearAll(){if(!confirm("入力内容をすべて消去します。よろしいですか？"))return;localStorage.removeItem(STORE_KEY);data={meta:{teisyutsubi:todayStr()},form:{},workers:[{}],cars:[{}],tools:[{}]};saved=false;document.getElementById("saveBtn").textContent="保存";render();toast("消去しました");}

function renderSteps(){
  document.getElementById("stepbar").innerHTML=STEPS.map(([n,l])=>
    `<button class="step ${step===n?"active":""}" data-step="${n}"><span class="n">${n}</span>${l}</button>`).join("");
}
function fieldHTML(arr){
  const [k,label,ph,flag,opts]=arr;
  const v=esc(data.form[k]||"");
  let ctrl;
  if(flag===2){
    ctrl=`<select class="inp" data-k="${k}">`+opts.map(o=>`<option ${data.form[k]===o?"selected":""}>${o}</option>`).join("")+`</select>`;
  }else if(flag===1){
    ctrl=`<textarea class="inp" rows="2" data-k="${k}" placeholder="${esc(ph)}">${v}</textarea>`;
  }else{
    const type=arr[3]==="date"?"date":"text";
    ctrl=`<input class="inp" type="${type}" data-k="${k}" value="${v}" placeholder="${esc(ph)}">`;
  }
  return `<label class="field"><span class="f-label">${label}</span>${ctrl}</label>`;
}
function section(title,fields){return `<div class="section"><div class="sec-head">${title}</div><div class="sec-body">${fields.map(fieldHTML).join("")}</div></div>`;}

function workerCard(w,i){
  const rows=WORKER_FIELDS.map(arr=>{
    const [k,label,ph,flag]=arr;const type=arr[3]==="date"?"date":"text";const isArea=flag===1;
    const v=esc(w[k]||"");
    const ctrl=isArea?`<textarea class="inp" rows="2" data-w="${i}" data-k="${k}" placeholder="${esc(ph)}">${v}</textarea>`
      :`<input class="inp" type="${type}" data-w="${i}" data-k="${k}" value="${v}" placeholder="${esc(ph)}">`;
    return `<label><span class="wlabel">${label}</span>${ctrl}</label>`;
  }).join("");
  const del=data.workers.length>1?`<button class="wdel" data-del="${i}">削除</button>`:"";
  return `<div class="wcard"><div class="whead"><span class="wno">${i+1}</span><span class="wname">${esc(w.shimei)||"（氏名未入力）"}</span>${del}</div><div class="wgrid">${rows}</div></div>`;
}

// 車両・工具などの汎用カード（listName: "cars"/"tools", fields定義, ラベル用キー）
function itemCard(item,i,fields,listName,titleKey,titlePh){
  const rows=fields.map(arr=>{
    const [k,label,ph,flag]=arr;const isArea=flag===1;
    const v=esc(item[k]||"");
    const ctrl=isArea?`<textarea class="inp" rows="2" data-list="${listName}" data-i="${i}" data-k="${k}" placeholder="${esc(ph)}">${v}</textarea>`
      :`<input class="inp" type="text" data-list="${listName}" data-i="${i}" data-k="${k}" value="${v}" placeholder="${esc(ph)}">`;
    return `<label><span class="wlabel">${label}</span>${ctrl}</label>`;
  }).join("");
  const list=data[listName];
  const del=list.length>1?`<button class="wdel" data-delitem="${listName}" data-i="${i}">削除</button>`:"";
  const title=esc(item[titleKey])||titlePh;
  return `<div class="wcard"><div class="whead"><span class="wno">${i+1}</span><span class="wname">${title}</span>${del}</div><div class="wgrid">${rows}</div></div>`;
}

function navRow(){
  const prev=step>1?`<button class="nav nav-prev" data-go="${step-1}">← 戻る</button>`:"";
  const next=step<6?`<button class="nav nav-next" data-go="${step+1}">次へ →</button>`:"";
  return `<div class="navrow">${prev}${next}</div>`;
}

function render(){
  renderSteps();
  const m=document.getElementById("main");
  if(step===1){
    m.innerHTML=`<div class="note"><b>このフォームに入力するだけ</b>で、提出用の安全書類エクセルが自動で出来上がります。色付きの枠を上から順に入力してください。分からない欄は空けてかまいません。</div>`
      +section("① 会社の情報",STEP1)+section("② 社会保険",STEP1B)+navRow();
  }else if(step===2){
    m.innerHTML=section("③ 工事の情報",STEP2)
      +section("④ 許可①（必須）",STEP2B)
      +section("⑤ 許可②（2つ目があれば）",STEP2C)+navRow();
  }else if(step===3){
    m.innerHTML=section("⑥ 施工体制（技術者）",STEP3)
      +section("⑦ 外国人の従事状況",STEP3B)+navRow();
  }else if(step===4){
    const atMax=data.workers.length>=MAX_WORKERS;
    m.innerHTML=`<div class="note">現場に入る作業員を入力してください（このアプリは<b>最大${MAX_WORKERS}名まで</b>）。会社名などの共通項目は自動で反映されます。いなければ空のまま次へ進んでOKです。</div>
      <div class="note amber"><b>作業員が${MAX_WORKERS}名を超える業者さま・複数業者をまとめる方</b>は、お手数ですが<b>「方法②エクセル直接入力」</b>のファイルでご提出をお願いします。アプリは少人数向けの簡易版です。</div>`
      +data.workers.map((w,i)=>workerCard(w,i)).join("")
      +(atMax?`<div class="note" style="text-align:center;">${MAX_WORKERS}名に達しました。これ以上はエクセル直接入力をご利用ください。</div>`
              :`<button class="add" id="addW">＋ 作業員を追加</button>`)
      +navRow();
  }else if(step===5){
    const carMax=data.cars.length>=MAX_CARS;
    const toolMax=data.tools.length>=MAX_TOOLS;
    m.innerHTML=`<div class="note">現場に持ち込む<b>車両</b>と<b>電動工具</b>があれば入力してください。なければ空のまま次へ進んでOKです。</div>
      <div class="sec-head" style="border-radius:8px;margin-bottom:10px;">🚗 工事用車輌届（最大${MAX_CARS}台）</div>`
      +data.cars.map((c,i)=>itemCard(c,i,CAR_FIELDS,"cars","ban","（車両 未入力）")).join("")
      +(carMax?`<div class="note" style="text-align:center;">${MAX_CARS}台に達しました。</div>`
               :`<button class="add" data-additem="cars">＋ 車両を追加</button>`)
      +`<div class="sec-head" style="border-radius:8px;margin:18px 0 10px;">🔧 電気工具等使用届（最大${MAX_TOOLS}台）</div>`
      +data.tools.map((c,i)=>itemCard(c,i,TOOL_FIELDS,"tools","kikaimei","（工具 未入力）")).join("")
      +(toolMax?`<div class="note" style="text-align:center;">${MAX_TOOLS}台に達しました。</div>`
                :`<button class="add" data-additem="tools">＋ 工具を追加</button>`)
      +`<div class="note amber" style="margin-top:18px;"><b>クレーン・移動式クレーン等の重機、火気を使う作業</b>がある場合は、お手数ですが<b>「方法②エクセル直接入力」</b>のファイル、または出来上がったエクセルの該当シート（クレーン・車両系／火気使用）に直接ご記入ください。アプリでは車両と電動工具のみ対応しています。</div>`
      +navRow();
  }else if(step===6){
    const f=data.form;
    const ready=(f.kaisha||"").trim()!=="";
    const sum=[["会社名",f.kaisha],["代表者",f.daihyo],["工事内容",f.naiyo],
      ["現場代理人",f.genbaDairi],["主任技術者",f.shunin],
      ["作業員",data.workers.filter(w=>w.shimei).length+" 名"],
      ["車両",data.cars.filter(c=>c.ban||c.shoyusha).length+" 台"],
      ["工具",data.tools.filter(c=>c.kikaimei).length+" 台"]];
    m.innerHTML=`<div class="note">入力内容を確認して出力します。<b>「エクセルを作成する」</b>を押すと、提出用の様式に自動で書き込まれた完成ファイルがダウンロードされます。数式や書式はそのままで、車両届・火気などにも自動で反映されます。</div>
      <div class="summary">${sum.map(([l,v])=>`<div class="sumrow"><span class="sum-label">${l}</span><span class="sum-val">${esc(v)||"—"}</span></div>`).join("")}</div>
      ${ready?"":'<div class="warnbox">会社名が未入力です。STEP①で入力してください。</div>'}
      <button class="bigbtn" id="xlsxBtn" ${ready?"":"disabled"}>エクセルを作成する</button>
      <p class="outhint">スマホでは作成後に「共有」ボタンからLINE・メールで送れます。パソコンではダウンロードフォルダに保存されます。</p>
      ${navRow()}`;
  }
}

document.addEventListener("input",e=>{
  const t=e.target;
  if(t.dataset.list!==undefined){data[t.dataset.list][+t.dataset.i][t.dataset.k]=t.value;
    const card=t.closest(".wcard");if(card){const tk=(t.dataset.list==="cars"?"ban":"kikaimei");
      if(t.dataset.k===tk)card.querySelector(".wname").textContent=t.value||(t.dataset.list==="cars"?"（車両 未入力）":"（工具 未入力）");}}
  else if(t.dataset.k && t.dataset.w===undefined){data.form[t.dataset.k]=t.value;}
  else if(t.dataset.w!==undefined){data.workers[+t.dataset.w][t.dataset.k]=t.value;
    if(t.dataset.k==="shimei"){const card=t.closest(".wcard");if(card)card.querySelector(".wname").textContent=t.value||"（氏名未入力）";}}
});
// change と blur でも値を確実に拾う（スマホ日本語入力の変換確定漏れ対策）
function syncFromEvent(t){
  if(!t||!t.dataset)return;
  if(t.dataset.list!==undefined){data[t.dataset.list][+t.dataset.i][t.dataset.k]=t.value;}
  else if(t.dataset.k && t.dataset.w===undefined){data.form[t.dataset.k]=t.value;}
  else if(t.dataset.w!==undefined && t.dataset.k){data.workers[+t.dataset.w][t.dataset.k]=t.value;}
}
document.addEventListener("change",e=>{syncFromEvent(e.target);});
document.addEventListener("blur",e=>{syncFromEvent(e.target);},true);
document.addEventListener("compositionend",e=>{syncFromEvent(e.target);});
document.addEventListener("click",e=>{
  const t=e.target;
  if(t.dataset.go){syncAllInputs();step=+t.dataset.go;render();window.scrollTo(0,0);}
  else if(t.dataset.step){syncAllInputs();step=+t.dataset.step;render();window.scrollTo(0,0);}
  else if(t.id==="addW"){syncAllInputs();if(data.workers.length<MAX_WORKERS){data.workers.push({});}render();}
  else if(t.dataset.del!==undefined){syncAllInputs();data.workers.splice(+t.dataset.del,1);if(data.workers.length===0)data.workers.push({});render();}
  else if(t.dataset.additem){syncAllInputs();const ln=t.dataset.additem;const mx=(ln==="cars"?MAX_CARS:MAX_TOOLS);if(data[ln].length<mx){data[ln].push({});}render();}
  else if(t.dataset.delitem){syncAllInputs();const ln=t.dataset.delitem;data[ln].splice(+t.dataset.i,1);if(data[ln].length===0)data[ln].push({});render();}
  else if(t.id==="xlsxBtn"){makeExcel();}
});
document.getElementById("saveBtn").onclick=save;
document.getElementById("clearBtn").onclick=clearAll;
if(saved)document.getElementById("saveBtn").textContent="保存済 ↻";

/* ============================================================
   Excel生成：テンプレxlsxを解凍 → かんたん入力シートのセルを
   inlineStrで書き換え → 再圧縮。数式・書式は一切触らない。
   ============================================================ */
function b64ToUint8(b64){
  const bin=atob(b64);const len=bin.length;const arr=new Uint8Array(len);
  for(let i=0;i<len;i++)arr[i]=bin.charCodeAt(i);return arr;
}
function getTemplateBytes(){
  const raw=(window.TPL_B64||"").trim();
  if(!raw||raw==="__TEMPLATE_B64__"||raw.length<1000)return null;
  try{
    const bytes=b64ToUint8(raw);
    if(bytes.length<10000)return null; // 取り出し途中で欠けた場合の保険
    return bytes;
  }catch(e){return null;}
}
function xesc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function patchSheetXml(xml, addrVal){
  for(const[addr,val]of Object.entries(addrVal)){
    if(val===undefined||val==="")continue;
    const v=xesc(val);
    // 1) 空の自己終了セル <c r="C5" s="2"/>
    const reEmpty=new RegExp(`<c r="${addr}"([^>]*?)/>`);
    if(reEmpty.test(xml)){
      xml=xml.replace(reEmpty,`<c r="${addr}"$1 t="inlineStr"><is><t xml:space="preserve">${v}</t></is></c>`);
      continue;
    }
    // 2) 中身ありセル <c r="C5" ...>...</c>
    const reFull=new RegExp(`<c r="${addr}"([^>]*?)>[\\s\\S]*?</c>`);
    if(reFull.test(xml)){
      xml=xml.replace(reFull,(mm,attrs)=>{
        attrs=attrs.replace(/\s+t="[^"]*"/,"");
        return `<c r="${addr}"${attrs} t="inlineStr"><is><t xml:space="preserve">${v}</t></is></c>`;
      });
    }
  }
  return xml;
}

function syncAllInputs(){
  // 画面に出ている全入力欄を強制的に読み直す（イベント取りこぼしの最終保険）
  document.querySelectorAll("[data-k]").forEach(t=>{
    if(t.dataset.list!==undefined){data[t.dataset.list][+t.dataset.i][t.dataset.k]=t.value;}
    else if(t.dataset.w===undefined){if(t.value!=="")data.form[t.dataset.k]=t.value;}
    else{data.workers[+t.dataset.w][t.dataset.k]=t.value;}
  });
}
async function makeExcel(){
  const btn=document.getElementById("xlsxBtn");if(!btn)return;
  btn.disabled=true;const orig=btn.textContent;btn.textContent="作成中…";
  try{
    syncAllInputs();
    const bytes=getTemplateBytes();
    if(!bytes){toast("様式データが見つかりません（配布ファイルが壊れている可能性）");btn.disabled=false;btn.textContent=orig;return;}
    const zip=await JSZip.loadAsync(bytes);
    const sheetFile=zip.file(SHEET_PATH);
    if(!sheetFile){toast("かんたん入力シートが見つかりません");btn.disabled=false;btn.textContent=orig;return;}
    let xml=await sheetFile.async("string");
    // addr->value を作る
    const addrVal={};
    for(const[k,addr]of Object.entries(CELL_MAP)){
      const val=data.form[k];
      if(val!==undefined&&val!=="")addrVal[addr]=val;
    }
    xml=patchSheetXml(xml,addrVal);
    zip.file(SHEET_PATH,xml);
    // --- スマホExcel対策：各シートにも値を直接書き込む（単純参照セルのみ。加工数式は温存）---
    for(const[path,cells]of Object.entries(DERIVED_MAP)){
      const sf=zip.file(path);
      if(!sf)continue;
      let sx=await sf.async("string");
      const av2={};
      for(const[cell,key]of cells){
        const val=data.form[key];
        if(val!==undefined&&val!=="")av2[cell]=val;
      }
      if(Object.keys(av2).length){sx=patchSheetXml(sx,av2);zip.file(path,sx);}
    }
    // --- 作業員名簿シートに作業員データを書き込む（最大4名・1人2行）---
    try{
      const validWorkers=data.workers.filter(w=>w&&(w.shimei||w.furigana)).slice(0,MAX_WORKERS);
      if(validWorkers.length){
        const wf=zip.file(WORKER_SHEET);
        if(wf){
          let wx=await wf.async("string");
          const wav={};
          validWorkers.forEach((w,idx)=>{
            const off=idx*WORKER_STEP; // 1人目=0, 2人目=+2行...
            for(const[key,baseCell]of Object.entries(WORKER_CELL)){
              const val=w[key];
              if(val===undefined||val==="")continue;
              // baseCell 例 "D11" → 列D, 行11+off
              const mm=baseCell.match(/^([A-Z]+)(\d+)$/);
              const col=mm[1], row=parseInt(mm[2],10)+off;
              wav[col+row]=val;
            }
          });
          if(Object.keys(wav).length){wx=patchSheetXml(wx,wav);zip.file(WORKER_SHEET,wx);}
        }
      }
    }catch(e){console.warn("作業員名簿書込スキップ",e);}
    // --- 車両届・電気工具シートに書き込む（共通ヘルパー）---
    async function writeItems(sheetPath,cellMap,stepRows,items,maxN,keyCheck){
      try{
        const valid=items.filter(it=>it&&keyCheck(it)).slice(0,maxN);
        if(!valid.length)return;
        const sf=zip.file(sheetPath);if(!sf)return;
        let sx=await sf.async("string");const av={};
        valid.forEach((it,idx)=>{
          const off=idx*stepRows;
          for(const[key,baseCell]of Object.entries(cellMap)){
            const val=it[key];if(val===undefined||val==="")continue;
            const mm=baseCell.match(/^([A-Z]+)(\d+)$/);
            av[mm[1]+(parseInt(mm[2],10)+off)]=val;
          }
        });
        if(Object.keys(av).length){sx=patchSheetXml(sx,av);zip.file(sheetPath,sx);}
      }catch(e){console.warn("項目書込スキップ "+sheetPath,e);}
    }
    await writeItems(CAR_SHEET,CAR_CELL,CAR_STEP,data.cars||[],MAX_CARS,it=>it.ban||it.shoyusha||it.untensha);
    await writeItems(TOOL_SHEET,TOOL_CELL,TOOL_STEP,data.tools||[],MAX_TOOLS,it=>it.kikaimei);
    // 各シートの数式を「開いた時に必ず再計算」させる（スマホExcel対策）
    try{
      const wbFile=zip.file("xl/workbook.xml");
      if(wbFile){
        let wbxml=await wbFile.async("string");
        if(wbxml.indexOf("fullCalcOnLoad")===-1){
          if(wbxml.indexOf("<calcPr")!==-1){
            wbxml=wbxml.replace("<calcPr ","<calcPr fullCalcOnLoad=\"1\" ");
          }else{
            // calcPrが無い場合は補う
            wbxml=wbxml.replace("</workbook>","<calcPr fullCalcOnLoad=\"1\"/></workbook>");
          }
          zip.file("xl/workbook.xml",wbxml);
        }
      }
      // calcChainを削除して再計算を確実化（残っていると古い計算順序を使うため）
      if(zip.file("xl/calcChain.xml")){zip.remove("xl/calcChain.xml");}
    }catch(e){console.warn("recalc設定スキップ",e);}
    const out=await zip.generateAsync({type:"blob",
      mimeType:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
      compression:"DEFLATE"});
    const fname=`安全書類_${(data.form.kaisha||"提出").replace(/[\\/:*?"<>|]/g,"")}_${data.meta.teisyutsubi}.xlsx`;
    await shareOrDownload(out,fname);
    toast("エクセルを作成しました");
  }catch(e){console.error(e);toast("作成に失敗しました："+e.message);}
  btn.disabled=false;btn.textContent=orig;
}

async function shareOrDownload(blob,name){
  // スマホ: Web Share API でLINE/メール共有を優先
  try{
    if(navigator.canShare){
      const file=new File([blob],name,{type:blob.type});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:name});
        return;
      }
    }
  }catch(e){/* 共有キャンセル等はダウンロードにフォールバック */}
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;
  document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},1500);
}


render();
